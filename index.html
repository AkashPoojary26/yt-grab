<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTGrab — YouTube Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ──────────────────────────────────── */
    :root {
      --bg:        #0a0a0f;
      --bg2:       #111118;
      --bg3:       #18181f;
      --surface:   #1e1e28;
      --border:    #2a2a38;
      --accent:    #e8ff47;
      --accent2:   #47ffd4;
      --red:       #ff4757;
      --text:      #f0f0f5;
      --muted:     #6b6b80;
      --radius:    16px;
      --font:      'Syne', sans-serif;
      --mono:      'DM Mono', monospace;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="light"] {
      --bg:      #f4f4f0;
      --bg2:     #eaeae4;
      --bg3:     #e0e0d8;
      --surface: #ffffff;
      --border:  #d4d4cc;
      --text:    #111118;
      --muted:   #888880;
    }

    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ── Background Grid ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232,255,71,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 48px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.3rem; font-weight: 800; letter-spacing: -0.03em;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
    }
    .logo-icon svg { color: #0a0a0f; }
    .logo span { color: var(--accent); }

    .theme-btn {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: grid; place-items: center;
      transition: all var(--transition);
      font-size: 1.1rem;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); transform: rotate(20deg); }

    /* ── Hero ───────────────────────────────────────────── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--accent);
      position: relative;
    }
    .hero h1 em::after {
      content: '';
      position: absolute; bottom: -2px; left: 0; right: 0; height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 400;
    }

    /* ── Input Card ─────────────────────────────────────── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.1s ease both;
      transition: border-color var(--transition);
    }
    .input-card:focus-within { border-color: var(--accent); }

    .url-row {
      display: flex; gap: 10px;
      margin-bottom: 16px;
    }
    .url-input-wrap {
      flex: 1; position: relative;
    }
    .url-input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    input[type="url"], input[type="text"] {
      width: 100%;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      transition: all var(--transition);
      outline: none;
    }
    input:focus { border-color: var(--accent); background: var(--bg3); }
    input::placeholder { color: var(--muted); }

    .paste-btn {
      padding: 0 18px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
    }
    .paste-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Format toggles */
    .format-row {
      display: flex; gap: 8px;
      flex-wrap: wrap;
    }
    .format-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .format-chip.active {
      border-color: var(--accent);
      background: rgba(232,255,71,0.08);
      color: var(--accent);
    }
    .format-chip svg { flex-shrink: 0; }

    /* Quality selector */
    .quality-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 14px;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .quality-row.hidden { max-height: 0; opacity: 0; pointer-events: none; }
    .quality-row.visible { max-height: 80px; opacity: 1; }

    .quality-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all var(--transition);
    }
    .quality-btn.active {
      border-color: var(--accent2);
      background: rgba(71,255,212,0.08);
      color: var(--accent2);
    }

    /* Fetch button */
    .fetch-btn {
      width: 100%;
      margin-top: 18px;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #0a0a0f;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all var(--transition);
      letter-spacing: 0.01em;
    }
    .fetch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,255,71,0.25); }
    .fetch-btn:active { transform: translateY(0); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Loading Spinner ────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(10,10,15,0.3);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Video Info Card ────────────────────────────────── */
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      display: none;
      animation: fadeUp 0.5s ease both;
    }
    .info-card.visible { display: flex; gap: 16px; }

    .thumbnail-wrap {
      flex-shrink: 0;
      width: 140px; height: 88px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: var(--bg3);
    }
    .thumbnail-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .duration-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .info-meta { flex: 1; min-width: 0; }
    .info-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .info-details {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .info-tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 6px;
      background: var(--bg2);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .info-tag.green { color: var(--accent); border-color: rgba(232,255,71,0.3); background: rgba(232,255,71,0.06); }

    /* ── Download Button ────────────────────────────────── */
    .download-btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all var(--transition);
      letter-spacing: 0.01em;
      margin-bottom: 12px;
    }
    #downloadBtn {
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
      color: #0a0a0f;
      display: none;
    }
    #downloadBtn.visible { display: flex; animation: fadeUp 0.4s ease both; }
    #downloadBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(71,255,212,0.3); }
    #downloadBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Progress Bar ───────────────────────────────────── */
    .progress-wrap {
      display: none;
      margin-bottom: 12px;
      animation: fadeUp 0.3s ease both;
    }
    .progress-wrap.visible { display: block; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--muted);
      margin-bottom: 8px;
      font-family: var(--mono);
    }
    .progress-bar {
      height: 6px; border-radius: 3px;
      background: var(--bg3);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s infinite;
    }

    /* ── Error / Success Messages ───────────────────────── */
    .message {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 0.87rem;
      margin-bottom: 16px;
      display: none;
      align-items: center; gap: 10px;
      animation: fadeUp 0.3s ease both;
    }
    .message.visible { display: flex; }
    .message.error { background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3); color: #ff6b78; }
    .message.success { background: rgba(71,255,212,0.08); border: 1px solid rgba(71,255,212,0.25); color: var(--accent2); }

    /* ── History Section ────────────────────────────────── */
    .history-section {
      margin-top: 40px;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    .clear-btn {
      font-size: 0.75rem;
      color: var(--muted);
      background: none; border: none;
      cursor: pointer; font-family: var(--font);
      transition: color var(--transition);
    }
    .clear-btn:hover { color: var(--red); }

    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .history-item:hover { border-color: var(--accent); transform: translateX(4px); }
    .history-thumb {
      width: 56px; height: 36px;
      border-radius: 6px; overflow: hidden; flex-shrink: 0;
      background: var(--bg3);
    }
    .history-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .history-title {
      flex: 1; min-width: 0;
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-time {
      font-family: var(--mono);
      font-size: 0.7rem; color: var(--muted); flex-shrink: 0;
    }
    .history-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: 14px;
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      text-align: center;
      padding-top: 40px;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: var(--mono);
    }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 540px) {
      .url-row { flex-direction: column; }
      .paste-btn { padding: 12px; }
      .info-card.visible { flex-direction: column; }
      .thumbnail-wrap { width: 100%; height: 180px; }
      header { padding: 20px 0 36px; }
    }
  </style>
</head>

applyTheme();

themeBtn.addEventListener('click', () => {
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();
});

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  themeBtn.textContent = isDark ? '☀️' : '🌙';
}

// ── Format Chips ───────────────────────────────────────────────────────────
document.querySelectorAll('.format-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.format-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedFormat = chip.dataset.format;
    qualityRow.className = `quality-row ${selectedFormat === 'video' ? 'visible' : 'hidden'}`;
    updateDownloadButton();
  });
});

// ── Quality Buttons ────────────────────────────────────────────────────────
document.querySelectorAll('.quality-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedQuality = btn.dataset.q;
  });
});

// ── Paste Button ───────────────────────────────────────────────────────────
pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (text && text.includes('youtube') || text.includes('youtu.be')) {
      urlInput.value = text.trim();
      showMessage(null);
    } else if (text) {
      urlInput.value = text.trim();
    }
  } catch {
    urlInput.focus();
  }
});

// ── Auto-detect paste in input ─────────────────────────────────────────────
urlInput.addEventListener('paste', () => {
  setTimeout(() => {
    const val = urlInput.value.trim();
    if (isYouTubeUrl(val)) {
      // Auto-trigger fetch after a short delay
      setTimeout(fetchInfo, 400);
    }
  }, 100);
});

urlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') fetchInfo();
});

// ── Fetch Info ─────────────────────────────────────────────────────────────
fetchBtn.addEventListener('click', fetchInfo);

async function fetchInfo() {
  const url = urlInput.value.trim();
  if (!url) return showError('Please paste a YouTube URL.');
  if (!isYouTubeUrl(url)) return showError('That doesn\'t look like a valid YouTube URL.');

  showMessage(null);
  setFetchLoading(true);
  hideInfoCard();
  downloadBtn.classList.remove('visible');

  try {
    // MODIFIED: GET /download?url= replaces the old info lookup flow.
    const res = await fetch(`${API}/download?url=${encodeURIComponent(url)}`);
    let data = {};
    try {
      data = await res.json();
    } catch {
      data = {};
    }

    const apiError = getApiError(data);
    const downloadUrl = normalizeDownloadUrl(getApiDownloadUrl(data));

    if (!res.ok) return showError(apiError || 'Failed to fetch video info.');
    if (!downloadUrl) return showError(apiError || 'No download URL was returned by the server.');

    // MODIFIED: FastAPI returns { title, url }; keep state in the requested shape.
    currentVideoInfo = {
      title: getApiTitle(data),
      downloadUrl,
      originalUrl: url,
    };

    displayInfo(currentVideoInfo);
    downloadBtn.classList.add('visible');
    updateDownloadButton();
  } catch (err) {
    showError('Cannot connect to the download server. Please try again.');
  } finally {
    setFetchLoading(false);
  }
}

function displayInfo(data) {
  // MODIFIED: Derive thumbnail locally because the API only returns title and download URL.
  thumbImg.src = getYouTubeThumbnail(data.originalUrl);
  durationBadge.textContent = data.durationString || (data.duration ? formatSeconds(data.duration) : '—');
  videoTitle.textContent = data.title || 'Untitled video';
  uploaderTag.textContent = data.uploader || 'Unknown';
  viewsTag.textContent = data.viewCount ? formatViews(data.viewCount) + ' views' : '—';
  dateTag.textContent = data.uploadDate ? formatDate(data.uploadDate) : '—';
  infoCard.classList.add('visible');

  // Update available qualities
  if (data.availableQualities) {
    document.querySelectorAll('.quality-btn').forEach(btn => {
      if (data.availableQualities.includes(btn.dataset.q)) {
        btn.style.opacity = '1';
        btn.disabled = false;
      } else {
        btn.style.opacity = '0.35';
      }
    });
  }
}

function updateDownloadButton() {
  if (!currentVideoInfo) return;
  const icon = selectedFormat === 'video' ? '📹' : '🎵';
  const label = selectedFormat === 'video' ? `Download ${selectedQuality} MP4` : 'Download MP3 Audio';
  downloadBtnText.textContent = `${icon} ${label}`;
}

// ── Download ───────────────────────────────────────────────────────────────
downloadBtn.addEventListener('click', startDownload);

function startDownload() {
  if (!currentVideoInfo) return;
  if (!currentVideoInfo.downloadUrl) return showError('No download URL is available. Please fetch the video again.');

  showMessage(null);
  setDownloadLoading(true);
  showProgress('Opening download…');

  try {
    // MODIFIED: Direct browser download; the FastAPI backend no longer streams files.
    const a = document.createElement('a');
    a.href = currentVideoInfo.downloadUrl;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    setProgress(100, 'Download opened!');
    showSuccess('Download opened in a new tab.');
    addToHistory(currentVideoInfo);

    setTimeout(hideProgress, 1500);
  } catch (err) {
    hideProgress();
    showError('Download failed. Check your connection and try again.');
  } finally {
    setDownloadLoading(false);
  }
}

// ── History ────────────────────────────────────────────────────────────────
function addToHistory(info) {
  // MODIFIED: History now uses the original YouTube URL because currentVideoInfo no longer stores legacy fields.
  const originalUrl = info.originalUrl || info.url || '';
  const id = getYouTubeId(originalUrl) || originalUrl;
  const entry = {
    id,
    url: originalUrl,
    title: info.title,
    thumbnail: getYouTubeThumbnail(originalUrl),
    time: Date.now(),
  };
  history = [entry, ...history.filter(h => h.id !== entry.id)].slice(0, 10);
  localStorage.setItem('ytgrab_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (!history.length) {
    historyList.innerHTML = '<div class="history-empty">No downloads yet.</div>';
    return;
  }
  historyList.innerHTML = history.map(h => `
    <div class="history-item" data-url="${escHtml(h.url || '')}">
      <div class="history-thumb"><img src="${escHtml(h.thumbnail || getYouTubeThumbnail(h.url || ''))}" alt="" loading="lazy" /></div>
      <div class="history-title">${escHtml(h.title || 'Untitled video')}</div>
      <div class="history-time">${timeAgo(h.time)}</div>
    </div>
  `).join('');

  historyList.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      urlInput.value = item.dataset.url;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      fetchInfo();
    });
  });
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history = [];
  localStorage.removeItem('ytgrab_history');
  renderHistory();
});

// ── UI Helpers ─────────────────────────────────────────────────────────────
function setFetchLoading(on) {
  fetchBtn.disabled = on;
  fetchBtn.innerHTML = on
    ? `<div class="spinner"></div> Fetching…`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Fetch Video Info`;
}

function setDownloadLoading(on) {
  downloadBtn.disabled = on;
  if (on) {
    downloadBtnText.textContent = 'Downloading…';
    downloadBtn.querySelector('svg').style.display = 'none';
    downloadBtn.insertAdjacentHTML('afterbegin', '<div class="spinner"></div>');
  } else {
    const sp = downloadBtn.querySelector('.spinner');
    if (sp) sp.remove();
    downloadBtn.querySelector('svg').style.display = '';
    updateDownloadButton();
  }
}

function showError(msg) {
  errorText.textContent = msg;
  errorMsg.classList.add('visible');
  successMsg.classList.remove('visible');
}
function showSuccess(msg) {
  successText.textContent = msg;
  successMsg.classList.add('visible');
  errorMsg.classList.remove('visible');
}
function showMessage(type) {
  errorMsg.classList.remove('visible');
  successMsg.classList.remove('visible');
}

function showProgress(label) {
  progressWrap.classList.add('visible');
  progressLabel.textContent = label;
  progressFill.style.width = '0%';
  progressPct.textContent = '';
}
function setProgress(pct, label) {
  progressFill.style.width = `${pct}%`;
  progressPct.textContent = `${pct}%`;
  if (label) progressLabel.textContent = label;
}
function hideProgress() {
  progressWrap.classList.remove('visible');
}
function hideInfoCard() {
  infoCard.classList.remove('visible');
}

// ── Utils ──────────────────────────────────────────────────────────────────
function isYouTubeUrl(url) {
  return /^(https?:\/\/)?(www\.)?(youtube\.com\/(watch\?v=|shorts\/)|youtu\.be\/)/.test(url);
}
// MODIFIED: Normalize FastAPI response fields while keeping data.url as the primary contract.
function getApiTitle(data) {
  return data?.title || data?.data?.title || data?.result?.title || 'Untitled video';
}
function getApiDownloadUrl(data) {
  return data?.url || data?.downloadUrl || data?.download_url || data?.data?.url || data?.result?.url || '';
}
function normalizeDownloadUrl(url) {
  if (!url || typeof url !== 'string') return '';
  try {
    const parsed = new URL(url.trim(), API);
    return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '';
  } catch {
    return '';
  }
}
function getApiError(data) {
  const error = data?.error || data?.detail;
  if (!error) return '';
  if (typeof error === 'string') return error;
  if (Array.isArray(error)) return error.map(item => item?.msg || String(item)).join(' ');
  return error.message || JSON.stringify(error);
}
// MODIFIED: Local helpers replace metadata formerly supplied by the old info lookup.
function getYouTubeId(url) {
  try {
    const parsed = new URL(url.startsWith('http') ? url : `https://${url}`);
    const host = parsed.hostname.replace(/^www\./, '');
    const parts = parsed.pathname.split('/').filter(Boolean);

    if (host === 'youtu.be') return parts[0] || '';
    if (host.endsWith('youtube.com')) {
      if (parsed.pathname === '/watch') return parsed.searchParams.get('v') || '';
      if (['shorts', 'embed', 'live'].includes(parts[0])) return parts[1] || '';
    }
  } catch {
    return '';
  }
  return '';
}
function getYouTubeThumbnail(url) {
  const id = getYouTubeId(url);
  return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : '';
}
function formatSeconds(s) {
  if (!s) return '0:00';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function formatViews(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}
function formatDate(d) {
  if (!d || d.length < 8) return '—';
  return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
}
function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}
function sanitizeFilename(name) {
  return name.replace(/[\\/:*?"<>|]/g, '').substring(0, 80);
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
renderHistory();
</script>
</body>
</html>
